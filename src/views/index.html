<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sectio Áurea</title>
  <link href="../public/css/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />

  <style>
    * {
      font-family: "Poppins", sans-serif !important;
      
    }

    body {
      background: linear-gradient(135deg, #ffffff,  #6c757d);
      position: center;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background-image: radial-gradient(circle, #ffffff, #f8f8ed, #f7e8e8);
      overflow: auto;
          align-items: center;
    }

   

    h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #2b2b2b;
  
    }

    .card {
      border-radius: 40px;
      border: none;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .btn-dark {
      background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
      border: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn-dark:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    .form-control {
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #ddd;
    }

    .form-control:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 0.2rem rgba(108, 99, 255, 0.2);
    }

    .form-label
    {
          align-items: left;
    }
    
       .campos {
      width: 100%;
     
      display: block;
      padding: 10px 15px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      outline: none;
      font-size: 0.85rem;
    }


    /* ===== SPLASH SCREEN ===== */
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6c757d, #343a40);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .splash-content {
      text-align: center;
      animation: fadeInUp 0.8s ease;
    }

    .splash-logo {
      width: 130px;
      height: auto;
      margin-bottom: 20px;
      animation: pulse 1.5s infinite;
    }

    .splash-title {
      font-size: 2rem;
      font-weight: 700;
      color: white;
      margin-bottom: 10px;
      font-family: 'Poppins', sans-serif;
    }

    .splash-subtitle {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Poppins', sans-serif;
    }

    .loader {
      width: 40px;
      height: 40px;
      margin: 20px auto 0;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .splash-screen.hide {
      opacity: 0;
      visibility: hidden;
    }
  </style>

</head>

<body>

  <!-- SPLASH SCREEN (INICIALMENTE ESCONDIDA) -->
  <div class="splash-screen" id="splashScreen" style="display: none;">
    <div class="splash-content">
      <img src="../public/img/logoBranca.png" alt="Logo" class="splash-logo" id="splashLogo">
      <h1 class="splash-title">Sectio Aurea</h1>
      <p class="splash-subtitle">Carregando seu perfil administrativo...</p>
      <div class="loader"></div>
    </div>
  </div>

  <section class="d-flex align-items-start vh-100 pt-4">
    <div class="container">

      <!-- TÍTULO -->
      <div class="text-center mb-3">
        <h1 class="fw-bold">Sectio Aurea</h1>
        <h6>Sobre descobrir o seu jeito de aprender.</h6>
        <br>
      </div>

      <!-- CONTEÚDO -->
      <div class="row align-items-center justify-content-center">

        <!-- FORM (DIREITA) -->
        <div class="col-md-6">
          <div class="card shadow-lg p-4">
            <h5 class="fw-bold mb-3 text-center">Login</h5>

            <form id="loginForm">
              <div id="mensagem" class="mb-3"></div>

              <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" id="email" class="form-control campos" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" id="senha" class="form-control campos" required>
              </div>

              <button type="submit" class="btn btn-dark w-100 campos">
                Entrar
              </button>
            </form>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
   <script src="../public/js/scripts.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sectio Áurea</title>
  <link href="../public/css/style.css" rel="stylesheet">
  <script src="../public/js/sidebarimagem.js" defer></script>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
  

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    :root {
      --cor-primaria: #6c757d;
    }

    * {
      font-family: "Poppins", sans-serif !important;
      box-sizing: border-box;
    }

    body {
      background: #f8f8f8;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 250px;
      height: 100vh;
      background-color: #f2f2f2;
      font-weight: bold;
      z-index: 1040;
      transition: left 0.3s ease;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      padding: 20px 15px;
    }



    .sidebar .perfil-foto {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      margin: 0 auto 20px auto;
      display: block;
    }

    .sidebar a {
      color: black !important;
      background-color: transparent !important;
      font-weight: 600;
      border-radius: 8px;
      transition: 0.3s;
      padding: 12px 15px;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 5px;
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar a i {
      font-size: 1.2rem;
      width: 24px;
    }

    .sidebar a:hover {
      background-color: var(--cor-primaria) !important;
      color: white !important;
    }

    .content {
      margin-left: 250px;
      padding: 30px;
      min-height: 100vh;
      background-color: #f8f9fa;
    }

    h1 {
      color: #000000;
      font-size: 1.8rem;
      font-weight: 700;
    }

    h3 {
      text-align: center;
      margin: 0;
      font-size: 22px;
      color: #686868;
    }

   
      .campos {
      width: 100%;
      margin: 20px auto;
      display: block;
      padding: 10px 15px;
      border: 1px solid #e5e7eb;
      border-radius: 12px !important; 
      outline: none;
      font-size: 0.85rem;
    }

    campos:focus {
      border-color: var(--cor-primaria);
      box-shadow: 0 0 0 3px rgba(78, 78, 78, 0.1);
    }


    .card
    {
        border: 1px solid #e5e7eb;
      border-radius: 40px;
    }

    #saudacao
  {
      border-bottom: 2px solid #6c757d;
  padding-bottom: 10px;
  display: inline-block;
  }
  </style>
</head>

<body>

  
  <div class="sidebar d-flex flex-column fw-bold">
    <img src="../public/img/userteste.png" alt="Foto do perfil" class="perfil-foto" id="fotoPerfil">
    <a href="paginainicialusuario.html"><i class="bi bi-people-fill"></i> Lista de Usuários</a>
    <a href="desativar.html"><i class="bi bi-person-x-fill"></i> Desativar Usuário</a>
    <a href="cadastroAdm.html"><i class="bi bi-person-plus-fill"></i> Cadastrar Administrador</a>
    <a href="editarperfil.html"><i class="bi bi-pencil-square"></i> Editar seu Perfil</a>
    <a href="index.html"><i class="bi bi-box-arrow-right"></i> Sair de sua conta</a>
  </div>

  <div class="content">
   
<div class="header">
    <h1>Cadastrar Administrador</h1>
    <p class="subtitle">Cadastre novos membros para o nosso time </p>
</div>
    
  <div class="form">
    <div class="card p-4">
     <form id="cadastroAdmForm" enctype="multipart/form-data">
  <div class="mb-3 text-start">
    <label class="form-label">Nome</label>
    <input type="text" class="form-control campos" id="nome" name="nome" required>
  </div>
  <div class="mb-3 text-start">
    <label class="form-label">E-mail</label>
    <input type="email" class="form-control campos" id="email" name="email" required>
  </div>
  <div class="mb-3 text-start">
    <label class="form-label">Senha</label>
    <input type="password" class="form-control campos" id="senha" name="senha" required>
  </div>
  <div class="mb-3 text-start">
    <label class="form-label">Foto de perfil</label>
    <input type="file" class="form-control campos" id="foto" name="foto" accept="image/*">
  </div>
  <button type="submit" class="btn btn-dark w-100 campos">Cadastrar</button>
</form>
<div id="mensagem" class="mt-2"></div>

    </div>
  </div>

  <script src="../public/js/cadastrarAdm.js"></script>


</body>

</html>
